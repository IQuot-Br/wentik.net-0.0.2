name: Build NovaBlog APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Compilar APK NovaBlog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Tornar o Gradle executável
        run: chmod +x gradlew

      - name: Compilar APK (Debug)
        run: ./gradlew assembleDebug

      - name: Fazer upload do APK NovaBlog
        uses: actions/upload-artifact@v4
        with:
          name: NovaBlog-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
