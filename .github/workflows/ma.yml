name: Diagnóstico NovaBlog

on: [push]

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Listar arquivos do repositório
        run: |
          echo "=== ARQUIVOS NA RAIZ ==="
          ls -la
          echo "=== BUSCANDO O GRADLEW ==="
          find . -name "gradlew"
