name: Build NovaBlog APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Compilar APK NovaBlog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # CORREÇÃO: Entra na pasta 'android' para dar permissão
      - name: Tornar o Gradle executável
        run: chmod +x gradlew
        working-directory: android 

      # CORREÇÃO: Entra na pasta 'android' para compilar
      - name: Compilar APK (Debug)
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Fazer upload do APK NovaBlog
        uses: actions/upload-artifact@v4
        with:
          name: NovaBlog-Debug-APK
          path: "**/*.apk"
